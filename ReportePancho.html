<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte De Unidades
    </title>
</head>
<style>
    body{
        font-family: 'Courier New', Courier, monospace;
        text-align: center;
        background: #428866;
    }
    
    input::placeholder {
    color: #3a3737;
    font-family: 'Courier New', Courier, monospace;
}
    
input[type="checkbox"]{
    appearance: none;
    width: 35px;
    height: 22px;
    background: #ccc;
    border-radius: 20px;
    position: relative;
    cursor: pointer;
    transition: 0.3s;
}

input[type="checkbox"]::before {
    content: "";
    position: absolute;
    width: 18px;
    height: 18px;
    background: white;
    border-radius: 50%;
    top: 2px;
    left: 2px;
    transition: 0.3s;
}

input[type="checkbox"]:checked {
    background: #3bb355;
}

input[type="checkbox"]:checked::before {
    transform: translateX(13px);
}

    body input{
        display: flex;
        text-align: center;
        margin: 10px;
        background: rgba(255, 255, 255,0.3);
        line-height: 30px;
        border-radius: 10px;
        border: none;
    }
    body h1{
        color: #273b41;
    }
    .contenedor{
        display: inline-block;
        flex-direction: row;
        margin: 10px;
        text-align: center;
    }

    .botones button{
        font-family: 'Courier New', Courier, monospace;
        display: inline-block;
        text-align: center;
        background: rgb(127, 170, 110);
        color: rgb(34, 33, 33);
        border: none;
        border-radius: 5px;
        padding: 10px 20px;
        margin: 10px;
        cursor: pointer;
    }

    .chec{
        color: #273b41;
        display: flex;
        align-items: center;
        gap: 14px;
        justify-content: center;
    }
    
    #resultado, #resul{
        color: #273b41;
    }



</style>
<body>
    <h1>Reporte De Unidades</h1>
    <div class="contenedor">
    <input type="tel" placeholder="HORMIGA" id="hormiga" required>
    <input type="tel" placeholder="RABÓN" id="rabon">
    <input type="tel" placeholder="TORTÓN" id="torton">
    <input type="tel" placeholder="PLANA" id="plana">
    </div>

    <div class="chec">
    <label for="checklimpia" id="limpia">Limpia</label>
    <input type="checkbox" id="checklimpia" onclick="procesar('*ÁREA LIMPIA*')">

    <label for="checkSucia" id="sucia">Sucia</label>
    <input type="checkbox" id="checkSucia" onclick="procesar('*ÁREA SUCIA*')">
    </div>
    
    <div class="botones">
    <button onclick="copiar()">Copiar</button>
    </div>

    <h2 id="resul">Resultado:</h2>
    <p id="resultado"></p>
</body>

<script>
    function formatear(unidades, prefijo, threshold = 100){
        const lista = unidades.split(',').filter(num => num.trim() !== '');
        const unidadesF = lista.map(num => {
            const numero = parseInt(num.trim(), 10);
            if (numero < threshold){
                return `${prefijo}0${numero}`;
            } else{
                return `${prefijo}${numero}`;
            }
        });
        return unidadesF;

    }


    function procesar(opcion){
        const hormigas = document.getElementById('hormiga').value;
        const rabones = document.getElementById('rabon').value;
        const tortons = document.getElementById('torton').value;
        const planas = document.getElementById('plana').value;
        const limpi = document.getElementById('limpia');
        const suci = document.getElementById('sucia');
        const texto = document.getElementById('resultado');

        if(opcion === "limpi"){
            suci.checked = false;
            texto.textContent = "Area Limpia"
        }
        else{
            limpi.checked = false;
            texto.textContent = "Area Sucia";
        }

        const hormigaF = formatear(hormigas, 'V-0', 10);
        const rabonF = formatear(rabones, 'V-0', 10);
        const tortonF = formatear(tortons, 'V-0', 10);
        const planaF = formatear(planas, 'VP-0', 10);
        

        let resultado = opcion + '<br><br>'; 
            if (hormigaF.length > 0){
                resultado +=  '*HORMIGA:*<br>';
                resultado += hormigaF.join('<br>') + '<br><br>';
            }

            if (rabonF.length > 0){
                resultado += '*RABÓN:* <br>';
                resultado += rabonF.join('<br>') + '<br><br>';
            }

if (tortonF.length > 0){
                resultado += '*TORTÓN:* <br>';
                resultado += tortonF.join('<br>') + '<br><br>';
            }
if (planaF.length > 0){
                resultado += '*PLANA:* <br>';
                resultado += planaF.join('<br>') + '<br><br>';
            }
            
        document.getElementById('resultado').innerHTML = resultado;

    }


    function copiar(){
        const resultado = document.getElementById('resultado').innerText;
        const textarea = document.createElement('textarea');
        textarea.value =  resultado;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        alert('Texto copiado👍');
    }

    document.addEventListener('DOMContentLoaded', (event) =>{
        document.addEventListener('keydown', (event)=> {
            if (event.key === 'Enter') {
                event.preventDefault();
                procesar();
            }
        })
    })


</script>
</html>
